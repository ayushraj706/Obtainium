name: Build and Release

on:
  push:
    branches:
      - main 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          
      # --- FIXED: Metrolist ki tarah JDK 21 se JDK 17 par switch kiya stable signing ke liye ---
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin' 
          java-version: '17'

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Build APKs
        run: |
          flutter pub get
          sed -i -e 's/-Wl,/-Wl,--build-id=none,/' ${PUB_CACHE:-$HOME/.pub-cache}/hosted/*/jni-*/src/CMakeLists.txt
          flutter build apk --flavor normal && flutter build apk --split-per-abi --flavor normal
          for file in build/app/outputs/flutter-apk/app-*normal*.apk*; do mv "$file" "${file//-normal/}"; done
          flutter build apk --flavor fdroid -t lib/main_fdroid.dart && flutter build apk --split-per-abi --flavor fdroid -t lib/main_fdroid.dart
          rm -f ./build/app/outputs/flutter-apk/*.sha1

      # --- MANUAL KEYSTORE DIRECTORY SETUP (Env ke naam purane wale hi hain) ---
      - name: Create Keystore Directory
        run: mkdir -p keystore

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/release.jks

      # --- MANUAL SIGNING (Metrolist wala Zipalign aur Apksigner loop) ---
      - name: Sign APKs
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          for apk in $(find build/app/outputs/flutter-apk -type f -name '*.apk'); do
            if [[ "$apk" == *"-aligned.apk" || "$apk" == *"-signed.apk" ]]; then
              continue
            fi
            echo "Signing $apk"
            $BUILD_TOOLS/zipalign -f -p 4 "$apk" "${apk%.apk}-aligned.apk"
            $BUILD_TOOLS/apksigner sign --ks keystore/release.jks --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} --ks-key-alias ${{ secrets.KEY_ALIAS }} --key-pass pass:${{ secrets.KEY_PASSWORD }} "${apk%.apk}-aligned.apk"
            rm "$apk"
            mv "${apk%.apk}-aligned.apk" "${apk%.apk}-signed.apk"
          done

      # --- ROLLING RELEASE ---
      - name: Create or Update Latest Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "latest" 
          name: "Latest Build" 
          allowUpdates: true 
          replacesArtifacts: true 
          prerelease: false
          # Ab release me sirf wahi APKs jayengi jinke aage "-signed" likha hoga
          artifacts: "build/app/outputs/flutter-apk/*-signed.apk" 
          draft: "false"
          generateReleaseNotes: true

      # --- TELEGRAM NOTIFICATION (Metrolist Style) ---
      - name: Send Telegram Message with Download Link
        continue-on-error: true
        uses: appleboy/telegram-action@master
        if: success()
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Obtainium Build Successful!
            
            Commit: ${{ github.event.commits[0].message || 'Manual/Sync Build' }}
            
            👇 Yahan click karke direct APK download karein:
            https://github.com/${{ github.repository }}/releases/latest
